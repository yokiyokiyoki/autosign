name: 构建 generate_qr.exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - generate_qr.py
      - .github/workflows/build_generate_qr_exe.yml

jobs:
  build_windows_exe:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install "qrcode[pil]"

      - name: 打包 exe
        run: |
          pyinstaller --noconfirm --clean --onefile --noconsole --name generate_qr generate_qr.py

      - name: 校验产物
        shell: pwsh
        run: |
          if (!(Test-Path "dist/generate_qr.exe")) {
            throw "打包失败：dist/generate_qr.exe 不存在"
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: generate_qr-windows-exe
          path: dist/generate_qr.exe
          if-no-files-found: error
          retention-days: 30
